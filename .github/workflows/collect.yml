name: Collecte affluence

on:
  schedule:
    - cron: '*/5 * * * *'   # toutes les 5 min (heure UTC ; GitHub peut décaler de qq min en charge)
  workflow_dispatch:          # bouton "Run" manuel

# Un seul run à la fois, pour éviter les conflits de commit
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer le nombre de visiteurs
        run: node collect.js

      - name: Commit du CSV
        run: |
          git config user.name  "affluence-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- data.csv; then
            git add data.csv
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            # rebase au cas où un autre run a poussé entre-temps
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          else
            echo "Aucun changement."
          fi
